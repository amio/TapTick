# =============================================================================
# TapTick — Build & Distribute
#
# Triggers:
#   • push to main       → build + test only (no signing/notarization)
#   • push of v* tag     → full pipeline: build → sign → notarize → DMG → upload
#   • workflow_dispatch  → manual trigger, same as tag push
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   APPLE_CERTIFICATE_BASE64   Base64-encoded Developer ID Application .p12
#   APPLE_CERTIFICATE_PASSWORD Password for the .p12 file
#   APPLE_TEAM_ID              Apple Developer Team ID (e.g. 3FKXTCP8JU)
#   APPLE_ID                   Apple ID email used for notarization
#   APPLE_APP_PASSWORD         App-specific password for notarytool
#   SPARKLE_ED_PRIVATE_KEY     EdDSA (ed25519) private key for signing updates
#   SPARKLE_ED_PUBLIC_KEY      EdDSA (ed25519) public key embedded in the app
# =============================================================================

name: Build & Distribute

on:
  push:
    # branches: [main]
    tags:     ["v*"]
  pull_request:
    # branches: [main]
  workflow_dispatch:

env:
  SCHEME:    TapTick
  BUNDLE_ID: com.taptick.app

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Unit tests — runs on every push/PR, no secrets needed
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Swift version
        run: swift --version

      - name: Run unit tests
        run: swift test --configuration debug

  # ---------------------------------------------------------------------------
  # Job 2: Build, sign, notarize, package as DMG — runs on tag push or manual
  # ---------------------------------------------------------------------------
  distribute:
    name: Build & Distribute
    runs-on: macos-26
    # Only run for version tags or manual dispatch; not on plain branch pushes
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: test
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      # ---- Install toolchain ------------------------------------------------

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install create-dmg
        run: brew install create-dmg

      # ---- Signing certificate -----------------------------------------------
      # Decode the .p12 from the secret, add it to a temporary keychain so that
      # xcodebuild can sign the app without any UI interaction.

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode and import certificate
          echo "$CERTIFICATE_BASE64" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          rm "$RUNNER_TEMP/cert.p12"

          # Allow codesign to access the key without a passphrase prompt
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add keychain to the search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      # ---- Derive version from tag or commit --------------------------------

      - name: Set version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"   # strip leading "v"
          else
            VERSION="0.0.0-dev+$(git rev-parse --short HEAD)"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Build version: $VERSION"

      # ---- Generate Xcode project -------------------------------------------

      - name: Generate Xcode project
        env:
          SPARKLE_ED_PUBLIC_KEY: ${{ secrets.SPARKLE_ED_PUBLIC_KEY }}
        run: make gen

      # ---- Archive ----------------------------------------------------------

      - name: Archive
        env:
          SPARKLE_ED_PUBLIC_KEY: ${{ secrets.SPARKLE_ED_PUBLIC_KEY }}
        run: |
          xcodebuild archive \
            -project     TapTick.xcodeproj \
            -scheme      "$SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/TapTick.xcarchive" \
            MARKETING_VERSION="$VERSION" \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            SPARKLE_ED_PUBLIC_KEY="$SPARKLE_ED_PUBLIC_KEY"

      # ---- Export (Developer ID signed .app) --------------------------------

      - name: Export archive
        run: |
          xcodebuild -exportArchive \
            -archivePath      "$RUNNER_TEMP/TapTick.xcarchive" \
            -exportPath       "$RUNNER_TEMP/export" \
            -exportOptionsPlist Resources/exportOptions.plist

      # ---- Notarize & staple ------------------------------------------------

      - name: Notarize
        env:
          APPLE_ID:           ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID:      ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP="$RUNNER_TEMP/export/TapTick.app"

          # Zip for submission (notarytool accepts .zip, .dmg, .pkg)
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/TapTick-notarize.zip"

          xcrun notarytool submit "$RUNNER_TEMP/TapTick-notarize.zip" \
            --apple-id  "$APPLE_ID" \
            --password  "$APPLE_APP_PASSWORD" \
            --team-id   "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$APP"

      # ---- Package as DMG ---------------------------------------------------

      - name: Create DMG
        run: |
          DMG_NAME="TapTick-$VERSION"

          create-dmg \
            --volname        "TapTick $VERSION" \
            --window-pos     200 120 \
            --window-size    660 400 \
            --icon-size      128 \
            --icon           "TapTick.app" 180 170 \
            --hide-extension "TapTick.app" \
            --app-drop-link  480 170 \
            "$RUNNER_TEMP/${DMG_NAME}.dmg" \
            "$RUNNER_TEMP/export/TapTick.app"

          echo "DMG_PATH=$RUNNER_TEMP/${DMG_NAME}.dmg" >> "$GITHUB_ENV"
          echo "DMG_NAME=${DMG_NAME}"                  >> "$GITHUB_ENV"

      # ---- Upload artifact --------------------------------------------------

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name:              ${{ env.DMG_NAME }}
          path:              ${{ env.DMG_PATH }}
          if-no-files-found: error
          retention-days:    30

      # ---- Publish GitHub Release (tag pushes only) -------------------------

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "TapTick ${{ env.VERSION }}" \
            --generate-notes \
            "${{ env.DMG_PATH }}#${{ env.DMG_NAME }}.dmg"

      # ---- Generate Sparkle appcast -----------------------------------------
      # Downloads Sparkle CLI tools, fetches the existing appcast from GitHub
      # Pages (if any), then runs generate_appcast to add the new release item.
      # The tool reads the EdDSA private key from SPARKLE_ED_PRIVATE_KEY env var
      # to sign the update archive.

      - name: Generate Sparkle appcast
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          # --- Install Sparkle CLI tools ---
          # Pin to the same version resolved by SPM (2.9.0).
          # Download to a file first — macOS BSD tar cannot decompress xz from stdin.
          SPARKLE_VERSION="2.9.0"
          SPARKLE_TOOLS="$RUNNER_TEMP/sparkle-tools"
          mkdir -p "$SPARKLE_TOOLS"
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            -o "$RUNNER_TEMP/Sparkle.tar.xz"
          tar xJf "$RUNNER_TEMP/Sparkle.tar.xz" -C "$SPARKLE_TOOLS"
          SPARKLE_BIN="$SPARKLE_TOOLS/bin"
          echo "Using Sparkle tools from: $SPARKLE_BIN"

          # --- Prepare updates folder ---
          # generate_appcast scans this folder for archives and produces appcast.xml.
          UPDATES_DIR="$RUNNER_TEMP/sparkle-updates"
          mkdir -p "$UPDATES_DIR"
          cp "${{ env.DMG_PATH }}" "$UPDATES_DIR/"

          # --- Fetch existing appcast (if any) so new items are appended ---
          if curl -sfL "https://amio.github.io/TapTick/appcast.xml" -o "$UPDATES_DIR/appcast.xml" 2>/dev/null; then
            echo "Fetched existing appcast.xml from GitHub Pages"
          else
            echo "No existing appcast found — will create a new one"
          fi

          # --- Run generate_appcast ---
          # --download-url-prefix: a URL prefix prepended to each archive filename
          #   to form the <enclosure url="...">. Since each release tag has its own
          #   path on GitHub Releases, we use the tag-specific URL prefix.
          #   For the current release the resulting URL will be:
          #     https://github.com/amio/TapTick/releases/download/vX.Y.Z/TapTick-X.Y.Z.dmg
          #
          # The private key is passed via stdin with --ed-key-file - so the CI runner
          # never needs a Keychain entry. The secret is never written to disk.
          echo "$SPARKLE_ED_PRIVATE_KEY" | "$SPARKLE_BIN/generate_appcast" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/amio/TapTick/releases/download/${GITHUB_REF_NAME}/" \
            --link "https://amio.github.io/TapTick/" \
            "$UPDATES_DIR"

          # --- Copy appcast into public/ for GitHub Pages deployment ---
          cp "$UPDATES_DIR/appcast.xml" public/appcast.xml
          echo "--- Appcast generated ---"
          cat public/appcast.xml

      # ---- Update Landing Page ----------------------------------------------

      - name: Update landing page
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          DOWNLOAD_URL="https://github.com/amio/TapTick/releases/download/${GITHUB_REF_NAME}/${{ env.DMG_NAME }}.dmg"

          sed -i '' "s|{{DOWNLOAD_URL}}|$DOWNLOAD_URL|g" public/index.html
          sed -i '' "s|{{VERSION}}|${{ env.VERSION }}|g" public/index.html

      # ---- Deploy to GitHub Pages -------------------------------------------

      - name: Deploy to GitHub Pages
        if: startsWith(github.ref, 'refs/tags/v')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

      # ---- Cleanup keychain -------------------------------------------------

      - name: Delete temporary keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
