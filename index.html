<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeyMagic — Global Hotkeys for macOS</title>
    <style>
        :root {
            --bg-color: #fbfbfd;
            --text-color: #1d1d1f;
            --accent-color: #007aff;
            --secondary-text: #86868b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --text-color: #f5f5f7;
                --accent-color: #007aff;
                --secondary-text: #86868b;
            }
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 40px 20px;
        }

        .icon {
            width: 128px;
            height: 128px;
            margin-bottom: 24px;
            border-radius: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 48px;
            font-weight: 700;
            margin: 0 0 16px 0;
            letter-spacing: -0.015em;
        }

        p {
            font-size: 21px;
            line-height: 1.38;
            font-weight: 400;
            margin: 0 0 32px 0;
            color: var(--secondary-text);
        }

        .cta {
            display: inline-block;
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 980px;
            font-size: 17px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .cta:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .version {
            margin-top: 24px;
            font-size: 12px;
            color: var(--secondary-text);
        }

        footer {
            position: absolute;
            bottom: 24px;
            width: 100%;
            font-size: 12px;
            color: var(--secondary-text);
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="icon.png" alt="KeyMagic Icon" class="icon">
        <h1>KeyMagic</h1>
        <p>Bind global hotkeys to app launches and shell scripts. Native, lightweight, and blazingly fast.</p>
        <a href="https://github.com/amio/KeyMagic/releases/download/v1.0.0%%2Bb7/KeyMagic-1.0.0+b7.dmg" class="cta">Download for macOS</a>
        <div class="version">Version 1.0.0+b7</div>
    </div>
    <footer>
        <p>&copy; 2025 <a href="https://github.com/amio/KeyMagic">KeyMagic</a>. Built with Swift & SwiftUI.</p>
    </footer>
</body>
</html>
