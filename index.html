<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TapTick — Global Hotkeys for macOS</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #f5f5f7;
        --surface: #ffffff;
        --text-primary: #1d1d1f;
        --text-secondary: #6e6e73;
        --accent: #0071e3;
        --accent-hover: #0077ed;
        --border: rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 24px 64px rgba(0, 0, 0, 0.13);
        --radius-xl: 20px;
      }

      /* ── Desktop: single viewport, no scroll ── */
      html,
      body {
        height: 100%;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
          "Helvetica Neue", sans-serif;
        background: var(--bg);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
      }

      /* ── Page shell ── */
      .page {
        display: grid;
        grid-template-rows: 60px 1fr 44px;
        height: 100vh;
        overflow: hidden;
      }

      /* ─────────────────────────────
           Nav
        ───────────────────────────── */
      nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 48px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .nav-brand {
        display: flex;
        align-items: center;
        gap: 9px;
        text-decoration: none;
        color: var(--text-primary);
      }

      .nav-brand img {
        width: 28px;
        height: 28px;
        border-radius: 6px;
      }

      .nav-brand-name {
        font-size: 16px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .nav-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .btn-github {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 13px;
        border-radius: 980px;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-secondary);
        text-decoration: none;
        border: 1px solid var(--border);
        transition:
          background 0.16s,
          color 0.16s,
          border-color 0.16s;
      }

      .btn-github:hover {
        background: var(--surface);
        color: var(--text-primary);
        border-color: rgba(0, 0, 0, 0.14);
      }

      .btn-download-nav {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        border-radius: 980px;
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        text-decoration: none;
        background: var(--accent);
        transition:
          background 0.16s,
          transform 0.14s;
      }

      .btn-download-nav:hover {
        background: var(--accent-hover);
        transform: scale(1.02);
      }

      /* ─────────────────────────────
           Hero — two columns
        ───────────────────────────── */
      .hero {
        display: grid;
        grid-template-columns: 370px 1fr;
        overflow: hidden;
        width: 100%;
        max-width: 1400px;
        margin: 0 auto;
      }

      /* ── Left panel ── */
      .hero-left {
        display: flex;
        flex-direction: column;
        justify-content: center; /* center content */
        align-items: center;
        padding: 40px 0 40px 48px;
        overflow: hidden;
      }

      /* Headline block */
      .hero-headline {
        margin-bottom: 30px;
        z-index: 2;
        text-align: center;
        width: 100%;
      }

      .hero-headline h1 {
        font-size: clamp(32px, 3.5vw, 48px);
        font-weight: 700;
        letter-spacing: -0.025em;
        line-height: 1.1;
      }

      .hero-headline p {
        margin-top: 12px;
        font-size: 16px;
        line-height: 1.6;
        color: var(--text-secondary);
      }

      /* ── Tabs ── */
      .tabs {
        display: flex;
        flex-direction: column;
        gap: 10px; /* visible gap between the two tab cards */
        margin: 40px 0 90px;
      }

      .tab {
        position: relative;
        display: flex;
        align-items: flex-start;
        gap: 14px;
        padding: 18px 18px 18px 22px;
        border-radius: 14px;
        cursor: pointer;
        border: none;
        background: transparent;
        text-align: left;
        width: 100%;
        transition: background 0.2s;
        overflow: hidden;
      }

      .tab::before {
        /* left accent bar */
        content: "";
        position: absolute;
        left: 0;
        top: 14px;
        bottom: 14px;
        width: 3px;
        border-radius: 2px;
        background: var(--accent);
        transform: scaleY(0);
        transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .tab:hover,
      .tab.active {
        background: rgba(0, 113, 227, 0.07);
      }

      .tab.active::before,
      .tab:hover::before {
        transform: scaleY(1);
      }

      .tab-icon {
        width: 42px;
        height: 42px;
        border-radius: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.05);
        flex-shrink: 0;
        transition: background 0.2s;
      }

      .tab.active .tab-icon,
      .tab:hover .tab-icon {
        background: rgba(0, 113, 227, 0.12);
      }

      .tab-icon svg {
        width: 20px;
        height: 20px;
        color: var(--text-secondary);
        transition: color 0.2s;
      }

      .tab.active .tab-icon svg,
      .tab:hover .tab-icon svg {
        color: var(--accent);
      }

      .tab-text {
        display: flex;
        flex-direction: column;
        gap: 3px;
        padding-top: 2px;
      }

      .tab-title {
        font-size: 17px;
        font-weight: 600;
        color: var(--text-primary);
        letter-spacing: -0.012em;
      }

      .tab-desc {
        font-size: 13px;
        color: var(--text-secondary);
        line-height: 1.45;
      }

      /* ── CTA ── */
      .hero-cta {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .btn-download-main {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 12px 26px;
        border-radius: 980px;
        font-size: 15px;
        font-weight: 600;
        color: #fff;
        text-decoration: none;
        background: var(--accent);
        box-shadow: 0 2px 12px rgba(0, 113, 227, 0.32);
        transition:
          background 0.16s,
          transform 0.14s,
          box-shadow 0.16s;
        width: fit-content;
      }

      .btn-download-main:hover {
        background: var(--accent-hover);
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(0, 113, 227, 0.38);
      }

      .btn-download-main:active {
        transform: translateY(0);
      }

      .version-tag {
        font-size: 11px;
        color: var(--text-secondary);
        text-align: center;
      }

      /* ── Right panel — screenshot ── */
      .hero-right {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        padding: 40px 48px 40px 48px;
        overflow: hidden;
      }

      /* Ambient glow */
      .hero-right::before {
        content: "";
        position: absolute;
        inset: 15% 10%;
        border-radius: 50%;
        background: radial-gradient(
          ellipse at 50% 55%,
          rgba(0, 113, 227, 0.11) 0%,
          transparent 68%
        );
        pointer-events: none;
        z-index: 0;
      }

      .screenshot-stage {
        position: relative;
        width: 100%;
        z-index: 1;
      }

      @media (min-width: 767px) {
        .screenshot-stage {
            margin-bottom: 5vh;
        }
      }

      /* Invisible sizer — keeps column height */
      .screenshot-placeholder {
        width: 100%;
        aspect-ratio: 16 / 10;
        visibility: hidden;
      }

      .screenshot-slide {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transform: scale(0.98) translateY(8px);
        pointer-events: none;
        transition:
          opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1),
          transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .screenshot-slide.active {
        opacity: 1;
        transform: scale(1) translateY(0);
        z-index: 2;
      }

      .screenshot-slide img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        border-radius: var(--radius-xl);
        /*box-shadow: var(--shadow-lg), 0 0 0 1px rgba(0,0,0,0.05);*/
        user-select: none;
        -webkit-user-drag: none;
      }

      /* ─────────────────────────────
           Footer
        ───────────────────────────── */
      footer {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        color: var(--text-secondary);
        border-top: 1px solid var(--border);
        padding: 0 48px;
      }

      footer a {
        color: var(--text-secondary);
        text-decoration: none;
      }

      footer a:hover {
        color: var(--text-primary);
      }

      /* ─────────────────────────────
           Mobile  (≤ 767px)
        ───────────────────────────── */
      @media (max-width: 767px) {
        html,
        body {
          height: auto;
        }

        .page {
          display: flex;
          flex-direction: column;
          height: auto;
          overflow: visible;
        }

        nav {
          padding: 0 20px;
          height: 56px;
          position: sticky;
          top: 0;
          background: rgba(245, 245, 247, 0.9);
          backdrop-filter: blur(12px);
          -webkit-backdrop-filter: blur(12px);
          z-index: 10;
        }

        .btn-github span {
          display: none;
        } /* hide label, keep icon */

        .hero {
          display: flex;
          flex-direction: column;
          overflow: visible;
        }

        .hero-right {
          order: 1;
          padding: 32px 20px 16px;
          align-items: center;
          text-align: center;
        }

        .hero-headline {
          margin-bottom: 24px;
          display: flex;
          flex-direction: column;
          align-items: center;
        }

        .hero-headline h1 {
          font-size: 32px;
        }

        .hero-headline h1 br {
          display: none;
        }

        .hero-headline p {
          max-width: 100%;
          text-align: center;
        }

        .hero-left {
          order: 2;
          padding: 16px 20px 36px;
          border-right: none;
          align-items: center;
        }

        .tabs {
          margin: 28px 0 32px;
          gap: 8px;
        }

        .hero-right {
          padding: 32px 20px;
        }

        .hero-right::before {
          display: none;
        }

        /* On mobile: tabs act as click toggles */
        .tab {
          padding: 15px 16px 15px 20px;
        }

        footer {
          padding: 0 20px;
          height: 48px;
        }
      }

      /* ─────────────────────────────
           Tablet  (768px – 1023px)
        ───────────────────────────── */
      @media (min-width: 768px) and (max-width: 1023px) {
        .hero {
          grid-template-columns: 300px 1fr;
        }

        .hero-left {
          padding: 40px 28px 36px 32px;
        }

        nav {
          padding: 0 32px;
        }

        footer {
          padding: 0 32px;
        }

        .hero-right {
          padding: 32px 32px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <!-- Nav -->
      <nav>
        <a class="nav-brand" href="#">
          <img src="icon.png" alt="TapTick icon" />
          <span class="nav-brand-name">TapTick</span>
        </a>
        <div class="nav-actions">
          <a
            class="btn-github"
            href="https://github.com/amio/TapTick"
            target="_blank"
            rel="noopener"
          >
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"
              />
            </svg>
            <span>GitHub</span>
          </a>
          <a class="btn-download-nav" href="https://github.com/amio/TapTick/releases/download/v1.0.0+b16/TapTick-1.0.0+b16.dmg">
            <svg
              width="13"
              height="13"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M8 2v8M4 7l4 4 4-4M2 12h12" />
            </svg>
            Download
          </a>
        </div>
      </nav>

      <!-- Hero -->
      <main class="hero">
        <!-- Left -->
        <aside class="hero-left">
          <!-- Feature tabs -->
          <div class="tabs" role="tablist">
            <button
              class="tab active"
              data-target="apps"
              role="tab"
              aria-selected="true"
            >
              <span class="tab-icon">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="3" y="3" width="7" height="7" rx="1.5" />
                  <rect x="14" y="3" width="7" height="7" rx="1.5" />
                  <rect x="3" y="14" width="7" height="7" rx="1.5" />
                  <rect x="14" y="14" width="7" height="7" rx="1.5" />
                </svg>
              </span>
              <span class="tab-text">
                <span class="tab-title">Application Launcher</span>
                <span class="tab-desc">Instant app switching with hotkeys</span>
              </span>
            </button>

            <button
              class="tab"
              data-target="scripts"
              role="tab"
              aria-selected="false"
            >
              <span class="tab-icon">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="4 17 10 11 4 5" />
                  <line x1="12" y1="19" x2="20" y2="19" />
                </svg>
              </span>
              <span class="tab-text">
                <span class="tab-title">Script Runner</span>
                <span class="tab-desc"
                  >Trigger shell scripts from anywhere</span
                >
              </span>
            </button>
          </div>

          <!-- Download CTA -->
          <div class="hero-cta">
            <a class="btn-download-main" href="https://github.com/amio/TapTick/releases/download/v1.0.0+b16/TapTick-1.0.0+b16.dmg">
              <svg
                width="15"
                height="15"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M8 2v8M4 7l4 4 4-4M2 12h12" />
              </svg>
              Download for macOS
            </a>
            <span class="version-tag">Version 1.0.0+b16 · macOS 15+</span>
          </div>
        </aside>

        <!-- Right — screenshot stage -->
        <div class="hero-right">
          <div class="hero-headline">
            <h1>Global Hotkeys<br />for macOS</h1>
            <p>
              Bind keyboard shortcuts to app launches and shell scripts.
              Native, lightweight, and instant.
            </p>
          </div>

          <div class="screenshot-stage" id="screenshotStage">
            <div class="screenshot-placeholder"></div>

            <div class="screenshot-slide active" id="slide-apps">
              <img
                src="screenshot-apps.png"
                alt="Application Launcher screenshot"
              />
            </div>
            <div class="screenshot-slide" id="slide-scripts">
              <img
                src="screenshot-scripts.png"
                alt="Script Runner screenshot"
              />
            </div>
          </div>
        </div>
      </main>

      <!-- Footer -->
      <footer>
        <p>
          &copy; 2026 <a href="https://github.com/amio/TapTick">TapTick</a>.
          Built with Swift &amp; SwiftUI.
        </p>
      </footer>
    </div>

    <script>
      const tabs = document.querySelectorAll(".tab");
      let current = "apps";

      const isMobile = () => window.matchMedia("(max-width: 767px)").matches;

      tabs.forEach((tab) => {
        tab.addEventListener("mouseenter", () => {
          if (!isMobile()) switchTo(tab.dataset.target);
        });
        tab.addEventListener("click", () => {
          switchTo(tab.dataset.target);
        });
      });

      function switchTo(target) {
        if (target === current) return;

        const prevSlide = document.getElementById("slide-" + current);
        const nextSlide = document.getElementById("slide-" + target);

        tabs.forEach((t) => {
          const isActive = t.dataset.target === target;
          t.classList.toggle("active", isActive);
          t.setAttribute("aria-selected", String(isActive));
        });

        prevSlide.classList.remove("active");
        nextSlide.classList.add("active");

        current = target;
      }
    </script>
  </body>
</html>
