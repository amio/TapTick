name: TapTick
options:
  bundleIdPrefix: com.taptick
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: false
    DEVELOPMENT_TEAM: "3FKXTCP8JU"
    CODE_SIGN_IDENTITY: "Apple Development"
  configs:
    Release:
      ENABLE_HARDENED_RUNTIME: true

packages:
  TapTickKit:
    path: .
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"

targets:
  TapTick:
    type: application
    platform: macOS
    sources:
      - path: Sources/TapTick
      - path: Resources/Assets.xcassets
    dependencies:
      - package: TapTickKit
        product: TapTickKit
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taptick.app
        PRODUCT_NAME: TapTick
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/TapTick.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "15"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        COMBINE_HIDPI_IMAGES: true
        ENABLE_TESTING_SEARCH_PATHS: true
        SPARKLE_ED_PUBLIC_KEY: ""
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"

  TapTickUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Tests/TapTickUITests
    dependencies:
      - target: TapTick
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taptick.uitests
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: TapTick

schemes:
  TapTick:
    build:
      targets:
        TapTick: all
        TapTickUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: TapTickUITests
          parallelizable: false
    archive:
      config: Release