name: KeyMagic
options:
  bundleIdPrefix: com.keymagic
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: false
    DEVELOPMENT_TEAM: "3FKXTCP8JU"
    CODE_SIGN_IDENTITY: "Apple Development"
  configs:
    Release:
      ENABLE_HARDENED_RUNTIME: true

packages:
  KeyMagicKit:
    path: .

targets:
  KeyMagic:
    type: application
    platform: macOS
    sources:
      - path: Sources/KeyMagic
      - path: Resources/Assets.xcassets
    dependencies:
      - package: KeyMagicKit
        product: KeyMagicKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.keymagic.app
        PRODUCT_NAME: KeyMagic
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/KeyMagic.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "6"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        COMBINE_HIDPI_IMAGES: true
        ENABLE_TESTING_SEARCH_PATHS: true
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"

  KeyMagicUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Tests/KeyMagicUITests
    dependencies:
      - target: KeyMagic
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.keymagic.uitests
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: KeyMagic

schemes:
  KeyMagic:
    build:
      targets:
        KeyMagic: all
        KeyMagicUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: KeyMagicUITests
          parallelizable: false
    archive:
      config: Release
